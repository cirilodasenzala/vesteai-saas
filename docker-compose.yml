# =========================================================
# VesteAI — Infra de desenvolvimento
# Sobe: PostgreSQL, Redis, MinIO (S3) + cria o bucket.
# A API roda fora do compose no dev (npm run api:dev), mas
# há um serviço "api" comentado para subir tudo junto.
# =========================================================
services:
  postgres:
    image: postgres:16-alpine
    container_name: vesteai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vesteai
      POSTGRES_USER: vesteai
      POSTGRES_PASSWORD: vesteai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vesteai -d vesteai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: vesteai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: vesteai-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  createbuckets:
    image: minio/mc:latest
    container_name: vesteai-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/vesteai;
      mc anonymous set download local/vesteai;
      echo 'Bucket vesteai pronto.';
      exit 0;
      "

  # Descomente para rodar a API dentro do compose (produção-like).
  # api:
  #   build:
  #     context: .
  #     dockerfile: apps/api/Dockerfile
  #   container_name: vesteai-api
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #     minio:
  #       condition: service_healthy
  #   env_file: .env
  #   environment:
  #     DATABASE_URL: postgresql://vesteai:vesteai@postgres:5432/vesteai?schema=public
  #     REDIS_HOST: redis
  #     S3_ENDPOINT: http://minio:9000
  #   ports:
  #     - "3000:3000"

volumes:
  pgdata:
  miniodata:
